name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # CPU wheel keeps the install ~10x smaller than the default CUDA build
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: pip install numpy ninja pytest
      # First test import JIT-compiles the C++ extension (gcc, ~1 min)
      - run: pytest -q -m "not slow"
